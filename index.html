<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직무역량 평가</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div class="quiz-header">
            <div class="header-center">
                <h1>직무역량 평가 문제풀이</h1>
            </div>
        </div>
        <div class="container">
            <div class="exam-selection">
                <div class="mode-setting">
                    <label class="mode-label-text">문제 출제 방식:</label>
                    <div class="mode-toggle-container">
                        <input type="checkbox" id="randomModeHome" class="mode-checkbox">
                        <label for="randomModeHome" class="mode-toggle-switch">
                            <span class="mode-slider"></span>
                        </label>
                        <span class="mode-status-text" id="modeStatusText">일반모드</span>
                    </div>
                </div>
                <div class="exam-buttons">
                    <button onclick="startExam('2021')" class="exam-btn">2021년 3급 승진 기초역량평가 필기시험 기출문제</button>
                    <button onclick="startExam('2022')" class="exam-btn">2022년 3급 승진 기초역량평가 필기시험 기출문제</button>
                    <button onclick="startExam('2023')" class="exam-btn">2023년 3급 승진 기초역량평가 필기시험 기출문제</button>
                    <button onclick="startExam('2024')" class="exam-btn">2024년 3급 승진 기초역량평가 필기시험 기출문제</button>
                    <button class="exam-btn disabled" disabled>2025년 사전공개문제 (준비중)</button>
                </div>
            </div>
        </div>
        </div>
    </div>
    
    <!-- Powered by badge -->
    <div class="powered-by-badge">
        powered by 2170153
    </div>
    
    <script src="script.js"></script>
</body>
</html>
